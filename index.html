        <button class="btn-stop" id="btn-stop">Stop</button>
      </div>
      <div style="margin-top:8px;display:flex;gap:8px;justify-content:center">
        <button class="btn-fullscreen" id="btn-fs">Fullscreen</button>
        ${window.electronAPI ? '<button class="btn-tray" id="btn-tray" style="background:#0a0a1a;color:#60a5fa;border:1px solid #1e3a5f;border-radius:6px;padding:6px 16px;cursor:pointer;font-size:12px">↗ Menu Bar</button>' : ''}
      </div>
    </div>`;

    el.innerHTML = html;

    if (this.isRetro) {
      // Set up retro canvas
      this.displayCanvas = document.getElementById('retro-display');
      // Create hidden game canvas at native resolution
      this.retroCanvas = document.createElement('canvas');
      this.retroCanvas.width = 384;
      this.retroCanvas.height = 216;
      RetroEngine.init(this.retroCanvas);
      this._sizeRetroDisplay();
    } else {
      this.canvas = document.getElementById('timer-canvas');
      this.ctx = this.canvas.getContext('2d');
    }

    // Animation mode switcher
    el.querySelectorAll('.anim-switch').forEach(btn => {
      btn.addEventListener('click', () => {
        this._activeAnim = btn.dataset.anim;
        this.render(); // re-render to update active state
      });
    });

    document.getElementById('btn-pause').addEventListener('click', () => TimerEngine.togglePause());
    document.getElementById('btn-skip').addEventListener('click', () => TimerEngine.skip());
    document.getElementById('btn-stop').addEventListener('click', () => TimerEngine.stop());
    const trayBtn = document.getElementById('btn-tray');
    if (trayBtn) trayBtn.addEventListener('click', () => {
      if (window.electronAPI) window.electronAPI.minimizeToTray();
    });
    const endBtn = document.getElementById('btn-end-set');
    if (endBtn) endBtn.addEventListener('click', () => TimerEngine.endSet());
    const backBtn = document.getElementById('btn-back');
    if (backBtn) backBtn.addEventListener('click', () => TimerEngine.prevActivity());
    const nextBtn = document.getElementById('btn-next');
    if (nextBtn) nextBtn.addEventListener('click', () => TimerEngine.nextActivity());
    document.getElementById('btn-fs').addEventListener('click', () => {
      const el = document.documentElement;
      if (!document.fullscreenElement) {
        el.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    });
    document.addEventListener('fullscreenchange', () => {
      setTimeout(() => this._sizeRetroDisplay(), 100);
    });

    this.update(0);
  },

  _sizeRetroDisplay() {
    if (!this.displayCanvas) return;
    // Scale to fit ~700px wide max
    const maxW = window.innerWidth - 40;
    const maxH = window.innerHeight - 200;
    const scaleX = Math.floor(maxW / 384);
    const scaleY = Math.floor(maxH / 216);
    this.scaleFactor = Math.max(2, Math.min(scaleX, scaleY, 10));
    const dw = 384 * this.scaleFactor;
    const dh = 216 * this.scaleFactor;
    this.displayCanvas.width = dw;
    this.displayCanvas.height = dh;
    this.displayCanvas.style.width = dw + 'px';
    this.displayCanvas.style.height = dh + 'px';
  },

  update(dt) {
    const engine = TimerEngine;
    if (engine.state !== 'RUNNING' && engine.state !== 'PAUSED') return;

    const a = engine.activity;

    if (this.isRetro && this.retroCanvas && this.displayCanvas) {
      // Update retro breath state
      RetroEngine.updateBreathState(dt);

      // Clear and draw the animation
      RetroEngine.ctx.clearRect(0, 0, 384, 216);

      const animId = this._activeAnim || a.animation;
      if (animId === 'goat') GoatAnim.draw(dt);
      else if (animId === 'goat_night') GoatNightAnim.draw(dt);
      else if (animId === 'train') TrainAnim.draw(dt);
      else if (animId === 'dog') DogAnim.draw(dt);
      else if (animId === 'skyline') SkylineAnim.draw(dt);
      else if (animId === 'sidescroll') SidescrollAnim.draw(dt);
      else if (animId === 'workout') WorkoutAnim.draw(dt);

      // Blit to display with pixelated scaling
      const dctx = this.displayCanvas.getContext('2d');
      dctx.imageSmoothingEnabled = false;
      dctx.clearRect(0, 0, this.displayCanvas.width, this.displayCanvas.height);
      dctx.drawImage(this.retroCanvas, 0, 0, this.displayCanvas.width, this.displayCanvas.height);

      // Subtle scanlines
      dctx.fillStyle = 'rgba(0,0,0,0.04)';
      for (let y = 0; y < this.displayCanvas.height; y += this.scaleFactor) {
        dctx.fillRect(0, y, this.displayCanvas.width, 1);
      }

      // Update overlay text
      const timeEl = document.getElementById('ro-time');
      const phaseEl = document.getElementById('ro-phase');
      const cycleEl = document.getElementById('ro-cycle');
      if (timeEl) {
        if (engine.manualWorkPhase) {
          timeEl.textContent = formatTime(engine.workElapsed);
        } else {
          timeEl.textContent = formatTime(Math.max(0, engine.phaseDuration - engine.elapsed));
        }
      }
      if (phaseEl) {
        const pName = a.phases[engine.phaseIdx]?.name || '';
        phaseEl.textContent = pName;
        const pColors = { 'INHALE': '#78d878', 'EXHALE': '#d8a878', 'HOLD': '#d8d878', 'SIP!': '#f0e068', 'WORK': '#ff6644' };
        phaseEl.style.color = pColors[pName] || '#f8f8f0';
      }
      if (cycleEl) cycleEl.textContent = `${a.cycles != null && a.cycles !== Infinity ? `Cycle ${engine.cycleIdx + 1} / ${a.cycles}` : ''}`;

    } else if (this.canvas && this.ctx) {
      // Standard ring timer
      const digitsEl = document.getElementById('timer-digits');
      if (digitsEl) {
        if (engine.manualWorkPhase) {
          digitsEl.textContent = formatTime(engine.workElapsed);
        } else {
          digitsEl.textContent = formatTime(Math.max(0, engine.phaseDuration - engine.elapsed));
        }
      }

      const cueEl = document.getElementById('timer-breath-cue');
      if (cueEl) {
        const cue = engine.getBreathingCue();
        if (cue) {
          cueEl.textContent = cue.text;
          cueEl.style.color = cue.text.includes('IN') ? 'var(--breathing)' : 'var(--stretching)';
        }
      }

      const ctx = this.ctx;
      const w = this.canvas.width;
      const h = this.canvas.height;
      const cx = w / 2, cy = h / 2, r = w / 2 - 20;

      ctx.clearRect(0, 0, w, h);

      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffffff10';
      ctx.lineWidth = 12;
      ctx.stroke();

      let progress;
      if (engine.manualWorkPhase) {
        progress = (Math.sin(engine.workElapsed * 2) + 1) / 2;
      } else {
        progress = Math.min(1, engine.elapsed / engine.phaseDuration);
      }
      const startAngle = -Math.PI / 2;
      const endAngle = startAngle + Math.PI * 2 * progress;
      const catColors = { breathing: '#00d4aa', workout: '#ff6b35', stretching: '#a855f7' };
      const color = catColors[a.category] || '#00d4aa';

      ctx.beginPath();
      ctx.arc(cx, cy, r, startAngle, endAngle);
      ctx.strokeStyle = color;
      ctx.lineWidth = 12;
      ctx.lineCap = 'round';
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx, cy, r, startAngle, endAngle);
      ctx.strokeStyle = color;
      ctx.lineWidth = 20;
      ctx.globalAlpha = 0.15;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
};

/* ═══════════════════════════════════════════
   10. APP
   ═══════════════════════════════════════════ */
const App = {
  currentView: 'deck',

  init() {
    document.querySelectorAll('nav button[data-view]').forEach(btn => {
      btn.addEventListener('click', () => this.switchView(btn.dataset.view));
    });

    document.getElementById('cm-preset').addEventListener('change', (e) => {
      const presets = {
        seluyanov: { name: 'Seluyanov TUT', cat: 'workout', p1: 'WORK', d1: '40', p2: 'REST', d2: '300', cy: '3' },
        emom: { name: 'EMOM', cat: 'workout', p1: 'GO', d1: '60', p2: '', d2: '0', cy: '10' },
        stretch: { name: 'Timed Stretch', cat: 'stretching', p1: 'HOLD', d1: '30', p2: '', d2: '0', cy: '1' },
      };
      const p = presets[e.target.value];
      if (p) {
        document.getElementById('cm-name').value = p.name;
        document.getElementById('cm-category').value = p.cat;
        document.getElementById('cm-p1-name').value = p.p1;
        document.getElementById('cm-p1-dur').value = p.d1;
        document.getElementById('cm-p2-name').value = p.p2;
        document.getElementById('cm-p2-dur').value = p.d2;
        document.getElementById('cm-cycles').value = p.cy;
      }
    });

    document.getElementById('cm-create').addEventListener('click', () => {
      const activity = createCustomActivity({
        name: document.getElementById('cm-name').value.trim() || 'Custom',
        category: document.getElementById('cm-category').value,
        p1Name: document.getElementById('cm-p1-name').value.trim() || 'WORK',
        p1Dur: parseFloat(document.getElementById('cm-p1-dur').value) || 30,
        p2Name: document.getElementById('cm-p2-name').value.trim(),
        p2Dur: parseFloat(document.getElementById('cm-p2-dur').value) || 0,
        cycles: parseInt(document.getElementById('cm-cycles').value) || 1
      });
      document.getElementById('custom-modal').classList.remove('active');
      this.startTimer([activity]);
    });

    const lastRoutine = Storage.getLastRoutine();
    if (lastRoutine) {
      const items = Storage.loadRoutine(lastRoutine);
      if (items) PlaylistBuilder.items = items;
    }

    DeckView.render();
    PlaylistBuilder.render();
    TimerView.render();

    // URL parameter API — enables Stream Deck, OBS browser source, deep links
    this._handleUrlParams();

    // postMessage API — enables Electron IPC and iframe embedding
    window.addEventListener('message', (e) => {
      const d = e.data;
      if (!d || !d.action) return;
      if (d.action === 'start' && d.protocol) {
        const rPlaylist = buildRoutine(d.protocol);
        if (rPlaylist.length) {
          this.startTimer(rPlaylist);
        } else {
          const activity = createActivity(d.protocol, { cycles: d.cycles });
          if (activity) this.startTimer([activity]);
        }
      }
      if (d.action === 'pause') TimerEngine.togglePause();
      if (d.action === 'skip') TimerEngine.skip();
      if (d.action === 'stop') TimerEngine.stop();
      if (d.action === 'next') TimerEngine.nextActivity();
      if (d.action === 'prev') TimerEngine.prevActivity();
    });
  },

  _handleUrlParams() {
    const params = new URLSearchParams(window.location.search);
    const minimal = params.get('minimal') === '1';
    const startProto = params.get('start');
    const cycles = params.get('cycles');
    const doFullscreen = params.get('fullscreen') === '1';

    // Minimal mode — hide nav for OBS browser source
    if (minimal) {
      document.querySelector('nav').style.display = 'none';
    }

    // Auto-start a protocol or Vesper
    if (startProto) {
      // Need a user gesture for audio + fullscreen — show a start interstitial
      const overlay = document.createElement('div');
      overlay.id = 'start-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:#1a1a2e;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;';
      const routineMatch = ROUTINE_LIBRARY.find(r => r.id === startProto);
      const label = routineMatch ? routineMatch.name : (PROTOCOLS[startProto]?.name || startProto);
      overlay.innerHTML = `
        <div style="font-size:14px;color:#8888aa;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px">DECKTIMER</div>
        <div style="font-size:36px;font-weight:700;color:#e0e0e0;margin-bottom:24px">${label}</div>
        <div style="font-size:16px;color:#00d4aa;font-weight:600;animation:pulse 2s ease-in-out infinite">TAP TO START</div>
        <style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}</style>
      `;
      document.body.appendChild(overlay);

      overlay.addEventListener('click', () => {
        overlay.remove();
        const routinePlaylist = buildRoutine(startProto);
        if (routinePlaylist.length) {
          this.startTimer(routinePlaylist);
        } else {
          const overrides = {};
          if (cycles) overrides.cycles = parseInt(cycles);
          const activity = createActivity(startProto, overrides);
          if (activity) this.startTimer([activity]);
        }
        if (doFullscreen) {
          document.documentElement.requestFullscreen().catch(() => {});
        }
      }, { once: true });
    }
  },

  switchView(name) {
    this.currentView = name;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('nav button[data-view]').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    const navBtn = document.querySelector(`nav button[data-view="${name}"]`);
    if (navBtn) navBtn.classList.add('active');

    if (name === 'deck') DeckView.render();
    if (name === 'workout') WorkoutView.render();
    if (name === 'playlist') PlaylistBuilder.render();
  },

  startTimer(queue) {
    TimerView._activeAnim = null; // reset to protocol default
    this.switchView('timer');
    TimerEngine.start(queue);
  }
};

document.addEventListener('DOMContentLoaded', () => App.init());
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && TimerEngine.state !== 'IDLE') {
    e.preventDefault();
    TimerEngine.togglePause();
  }
});

})();
</script>
</body>
